<title>Meu Plano de Ação — Liga Help!</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
<style>
:root{
  --bg:#0f1115; --card:#181b22; --card2:#1f232c; --border:#2a2f3a;
  --text:#eef0f3; --muted:#9aa0a8; --orange:#ff7a1a; --gold:#ffd23f;
  --success:#22c55e; --warning:#f59e0b; --danger:#ef4444; --blue:#60a5fa; --purple:#a78bfa;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif}
.app{max-width:1000px;margin:0 auto;padding:20px}
header{margin-bottom:20px}
header h1{margin:0;font-size:22px}
header h1 span{color:var(--orange)}
header .sub{color:var(--muted);font-size:13px;margin-top:4px}

.team-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:22px}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.tcard .label{font-size:12px;color:var(--muted)}
.tcard .value{font-size:22px;font-weight:700;margin-top:4px}
.tcard .value.orange{color:var(--orange)}
.tcard .value.gold{color:var(--gold)}
.progress{height:8px;border-radius:6px;background:var(--card2);overflow:hidden;margin-top:10px}
.progress > div{height:100%;background:linear-gradient(90deg,var(--orange),var(--gold))}

.ranking{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.loja-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;display:grid;grid-template-columns:44px 1fr auto;gap:14px;align-items:center;position:relative;overflow:hidden}
.loja-card.rank-1{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
.loja-card.rank-2{border-color:#c0c5ce}
.loja-card.rank-3{border-color:#cd7f32}
.rank-num{font-size:20px;font-weight:800;color:var(--muted);text-align:center}
.rank-1 .rank-num{color:var(--gold)}
.rank-2 .rank-num{color:#c0c5ce}
.rank-3 .rank-num{color:#cd7f32}
.loja-info .nome{font-weight:700;font-size:15px}
.loja-info .codigo{color:var(--muted);font-size:12px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;margin-left:8px;font-weight:600}
.valores{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.valores .item{font-size:12px;color:var(--muted)}
.valores .item b{color:var(--text);font-size:13px;display:block}
.mentor{margin-top:10px;background:var(--card2);border-radius:10px;padding:10px 12px;font-size:12.5px;line-height:1.5}
.mentor .princ{font-weight:600;margin-bottom:4px}
.mentor .ritmo{color:var(--muted)}
.side-stats{text-align:right;min-width:100px}
.spark{width:110px;height:30px;color:var(--orange);display:block;margin-left:auto}
.streak{font-size:11px;color:var(--warning);margin-top:4px}
.mix-details{margin-top:10px;font-size:12px}
.mix-details summary{cursor:pointer;color:var(--muted);outline:none;user-select:none}
.mix-row{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.mix-row span{color:var(--muted)}
.mix-row b{white-space:nowrap}
.mix-row small{color:var(--muted);white-space:nowrap}

.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:18px}
.panel h3{margin:0 0 12px;font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.faixas-table{width:100%;border-collapse:collapse;font-size:12px}
.faixas-table td{padding:4px 2px;border-bottom:1px solid var(--border)}
.faixas-note{font-size:11px;color:var(--muted);margin-top:8px}
#rankingConsultores{overflow-x:auto}
.cons-table{width:100%;border-collapse:collapse;font-size:13px}
.cons-table th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding:8px 10px;border-bottom:1px solid var(--border)}
.cons-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.cons-table tr.top1{background:rgba(255,210,63,.08)}
.cons-table tr.top2{background:rgba(192,197,206,.06)}
.cons-table tr.top3{background:rgba(205,127,50,.06)}
.cons-table .rank-cell{color:var(--muted);font-weight:700}
.hist-empty{color:var(--muted);font-size:12px;text-align:center;padding:10px 0}
.rv-panel{margin-top:8px}
.rv-item{margin-bottom:14px}
.rv-item:last-child{margin-bottom:0}
.rv-item-head{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px}
.rv-item-head b{color:var(--text)}
.rv-bar{position:relative;height:8px;background:var(--card2);border-radius:4px;margin:0 1px 5px}
.rv-bar-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#a78bfa,#60a5fa);border-radius:4px}
.rv-mark{position:absolute;top:-3px;width:2px;height:14px;background:var(--muted)}
.rv-mark.hit{background:var(--gold)}
.rv-status{font-size:11.5px;color:var(--muted);line-height:1.5}
.rv-status b{color:var(--gold)}
.rv-status .rv-pct{color:var(--blue)}
.rv-badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}

#confetti-container{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:999}
.confetti-piece{position:absolute;top:-10px;width:8px;height:14px;opacity:.9;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(360deg);opacity:0}}
footer{text-align:center;color:var(--muted);font-size:11px;margin-top:30px}
</style>
</head>

function MES(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function diasNoMes(mes){ const [y,m]=mes.split('-').map(Number); return new Date(y,m,0).getDate(); }
function diaDoMes(){ return new Date().getDate(); }
function diasRestantes(mes){ if(mes!==MES()) return 0; return Math.max(diasNoMes(mes)-diaDoMes(),0); }
function getMeta(mes){ return state.metaPorMes[mes] || 60000; }
function fmtBRL(v){ return (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fmtPct(v){ return (v||0).toLocaleString('pt-BR',{maximumFractionDigits:1})+'%'; }
function fmtBRLShort(v){
  if(v>=1000) return 'R$ '+(v/1000).toLocaleString('pt-BR',{maximumFractionDigits:0})+'k';
  return fmtBRL(v);
}
function evolucaoChartSVG(series){
  const allDatas = [...new Set(series.flatMap(s=>s.points.map(p=>p.data)))].sort();
  if(allDatas.length<2) return '<div class="hist-empty">Ainda não há dias suficientes de histórico pra montar o gráfico (precisa de pelo menos 2 datas com dados importados).</div>';
  const w=680,h=260,padL=58,padR=16,padT=16,padB=34;
  const innerW=w-padL-padR, innerH=h-padT-padB;
  const allVals = series.flatMap(s=>s.points.map(p=>p.valor));
  const maxV = Math.max(...allVals,1);
  const x = i => padL + (allDatas.length>1 ? (i/(allDatas.length-1))*innerW : innerW/2);
  const y = v => padT + innerH - (v/maxV)*innerH;
  const gridLines = [0,0.25,0.5,0.75,1].map(f=>{
    const yy = padT + innerH - f*innerH;
    const val = f*maxV;
    return `<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${w-padR}" y2="${yy.toFixed(1)}" stroke="#2a2f3a" stroke-width="1"/><text x="${padL-8}" y="${(yy+4).toFixed(1)}" font-size="10" fill="#9aa0a8" text-anchor="end">${fmtBRLShort(val)}</text>`;
  }).join('');
  const step = allDatas.length>8 ? Math.ceil(allDatas.length/8) : 1;
  const xLabels = allDatas.map((d,i)=> i%step!==0 ? '' : `<text x="${x(i).toFixed(1)}" y="${(h-padB+16).toFixed(1)}" font-size="10" fill="#9aa0a8" text-anchor="middle">${d.slice(8,10)}/${d.slice(5,7)}</text>`).join('');
  const lines = series.map(s=>{
    const byData = {}; s.points.forEach(p=>{ byData[p.data]=p.valor; });
    let d='', started=false;
    allDatas.forEach((dt,i)=>{
      if(byData[dt]===undefined) return;
      d += `${started?'L':'M'}${x(i).toFixed(1)},${y(byData[dt]).toFixed(1)} `;
      started = true;
    });
    const dots = allDatas.map((dt,i)=> byData[dt]===undefined ? '' : `<circle cx="${x(i).toFixed(1)}" cy="${y(byData[dt]).toFixed(1)}" r="3" fill="${s.color}"/>`).join('');
    return `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.2"/>${dots}`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">${gridLines}${xLabels}${lines}</svg>`;
}

function normalizeEntry(h){
  if(h.valores) return h;
  return {codigo:h.codigo, data:h.data, valores:{CNC:{atual:h.valor||0, meta:0}}};
}
function entriesFor(codigo,mes){
  return state.historico.filter(h=>h.codigo===codigo && h.data.startsWith(mes)).map(normalizeEntry).sort((a,b)=>a.data.localeCompare(b.data));
}
function valorProduto(codigo,mes,produto){
  const es = entriesFor(codigo,mes);
  for(let i=es.length-1;i>=0;i--){ if(es[i].valores[produto]) return es[i].valores[produto]; }
  return {atual:0, meta:0};
}
function valorAtual(codigo,mes){ return valorProduto(codigo,mes,'CNC').atual; }

function entriesForConsultor(nome,mes){

function valorProdutoConsultor(nome,mes,produto){
  const es = entriesForConsultor(nome,mes);
  for(let i=es.length-1;i>=0;i--){ if(es[i].valores[produto]) return es[i].valores[produto]; }

function qtdSegurosAtual(nome,mes){

function streak(codigo){
  const uniqueDates = [...new Set(state.historico.filter(h=>h.codigo===codigo).map(h=>h.data))].sort().reverse();
  if(!uniqueDates.length) return 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const last = new Date(uniqueDates[0]+'T00:00:00');
  if(Math.round((today-last)/86400000) > 1) return 0;
  let count=1;
  for(let i=1;i<uniqueDates.length;i++){
    const cur=new Date(uniqueDates[i-1]+'T00:00:00'), prev=new Date(uniqueDates[i]+'T00:00:00');
    if(Math.round((cur-prev)/86400000)===1) count++; else break;
  }
  return count;
}

function nivel(pct){
  if(pct>=150) return {n:6,label:'Lenda da Praça',emoji:'👑',color:'var(--gold)'};

  return {n:1,label:'Largada',emoji:'🚀',color:'var(--muted)'};

function faixaInfo(valor, faixas){
  let atual=null, proxima=null;
  for(const f of faixas){ if(valor>=f.producao) atual=f; else { if(!proxima) proxima=f; } }
  return {atual, proxima};
}

function renderFaixaRV(valor, faixas, label, diasRest){
  if(!faixas || !faixas.length) return '';
  const max = faixas[faixas.length-1].producao * 1.15;
  const barPct = Math.min(valor/max*100, 100);
  const {atual, proxima} = faixaInfo(valor, faixas);
  const marks = faixas.map(f=>`<div class="rv-mark${valor>=f.producao?' hit':''}" style="left:${Math.min(f.producao/max*100,100)}%" title="Faixa ${f.faixa} 4F: ${fmtBRL(f.producao)} → bônus ${fmtBRL(f.bonus)}"></div>`).join('');

  let pctAlvo, status, plano;
  if(atual && !proxima){
    pctAlvo = valor/atual.producao*100;
    status = `🏆 Faixa ${atual.faixa} 4F (máxima) atingida — bônus <b>${fmtBRL(atual.bonus)}</b>!`;
    plano = `📌 Plano de ação: faixa máxima já batida — continue vendendo ${label} pra aumentar ainda mais o resultado (sem teto).`;
  } else {
    const alvo = proxima || faixas[0];
    const falta = Math.max(alvo.producao - valor, 0);
    pctAlvo = valor/alvo.producao*100;
    status = atual
      ? `Faixa ${atual.faixa} 4F atingida — bônus <b>${fmtBRL(atual.bonus)}</b>. Faltam ${fmtBRL(falta)} pra Faixa ${proxima.faixa} (${fmtBRL(proxima.bonus)}).`
      : `Faltam ${fmtBRL(falta)} pra Faixa 1 4F (${fmtBRL(faixas[0].bonus)}).`;
    plano = diasRest > 0
      ? `📌 Plano de ação: vender <b>${fmtBRL(falta/diasRest)}/dia</b> de ${label} nos próximos ${diasRest} dia(s) pra bater a Faixa ${alvo.faixa}.`
      : `📌 Plano de ação: mês fechando — foque em concluir propostas de ${label} em andamento.`;
  }
  return `<div class="rv-item">
    <div class="rv-item-head"><span>${label}</span><b>${fmtBRL(valor)}</b></div>
    <div class="rv-bar"><div class="rv-bar-fill" style="width:${barPct}%"></div>${marks}</div>
    <div class="rv-status">${status} <span class="rv-pct">(${fmtPct(pctAlvo)} da faixa)</span></div>
    <div class="rv-status">${plano}</div>
  </div>`;
}

function renderRVPanel(rvFaixas, getValor, diasRest){
  if(!rvFaixas) return '';
  return Object.keys(RV_LABELS).map(key=>renderFaixaRV(getValor(key), rvFaixas[key], RV_LABELS[key], diasRest)).join('');
}

function mentorTip(codigo,mes){
  const meta=getMeta(mes), atual=valorAtual(codigo,mes);
  const pct = meta? atual/meta*100:0;
  const dRest=diasRestantes(mes), dPassed=diaDoMes();
  const mediaDia = dPassed? atual/dPassed:0;
  const falta = Math.max(meta-atual,0);
  const necessarioDia = dRest>0? falta/dRest : (falta>0? Infinity:0);
  const lvl = nivel(pct);
  let ritmo;
  if(pct>=100){
    ritmo = `Excedente de ${fmtBRL(atual-meta)} sobre a meta. Continue vendendo pra subir de faixa!`;
  } else if(dRest<=0){
    ritmo = `⏰ Mês fechando! Faltam ${fmtBRL(falta)} pra bater a meta — corra atrás das propostas em análise.`;
  } else if(mediaDia >= necessarioDia){
    ritmo = `✅ No ritmo certo: média de ${fmtBRL(mediaDia)}/dia. Mantendo esse ritmo a meta é batida antes do fim do mês.`;
  } else if(necessarioDia === Infinity){
    ritmo = `⚠️ Ainda sem produção e restam ${dRest} dia(s). Bora começar a girar hoje.`;
  } else {
    ritmo = `⚠️ Faltam ${fmtBRL(falta)} em ${dRest} dia(s) → precisa vender ${fmtBRL(necessarioDia)}/dia (média atual: ${fmtBRL(mediaDia)}/dia).`;
  }
  return {principal:TIPS[lvl.n], ritmo, lvl, pct};
}

function sparklineSVG(codigo,mes){
  const es=entriesFor(codigo,mes).filter(e=>e.valores.CNC);
  if(es.length<2) return '';
  const vals=es.map(e=>e.valores.CNC.atual);
  const max=Math.max(...vals,1), min=Math.min(...vals,0);
  const w=110,h=30;
  const pts=vals.map((v,i)=>{
    const x=(i/(vals.length-1))*w;
    const y=h-((v-min)/((max-min)||1))*h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" class="spark"><polyline points="${pts}" fill="none" stroke="currentColor" stroke-width="2"/></svg>`;
}

      <h3>📈 Evolução diária de CNC</h3>
      ${evolucaoChartSVG([{label:nome, color:'#ff7a1a', points: entriesForConsultor(nome, mes).filter(e=>e.valores.CNC).map(e=>({data:e.data, valor:e.valores.CNC.atual}))}])}
    </div>

    <div class="panel">
      <h3>📦 Mix completo atualizado</h3>
      ${mix}
    </div>

    <div class="panel">
      <h3>🎯 Meta 4F (bônus interno da rede)</h3>
      <div class="rv-panel">${rvHtml}</div>
    </div>

    <div class="panel">
      <h3>🛡️ Seguros</h3>
      <div class="rv-item">
        <div class="rv-item-head"><span>Qtd. vendida no mês</span><b>${qtdSeguros}</b></div>
        <div class="rv-status">${elegivelSeguro
          ? `✅ Elegível ao prêmio de seguros — estimado <b>${fmtBRL(premioSeguro)}</b> (+ R$ 50 se ficar em 1º lugar geral).`
          : `Faltam ${MIN_SEGUROS_ELEGIVEL - qtdSeguros} seguro(s) pra ficar elegível ao prêmio (mínimo ${MIN_SEGUROS_ELEGIVEL}).`}</div>
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
